name: Release

# Esegue python-semantic-release ad ogni push su master:
# - analizza i commit dall'ultimo tag (Conventional Commits)
# - calcola il nuovo numero di versione (patch/minor/major)
# - crea il tag annotato vX.Y.Z
# - aggiorna CHANGELOG.md e committa
# - crea la GitHub Release (vuota; l'exe lo carichi tu con release.ps1)

on:
  push:
    branches:
      - master

permissions:
  contents: write   # serve per pushare tag, commit di changelog e Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Evita loop infinito: il commit di release fatto dal bot ha "[skip ci]"
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout (full history per leggere i tag)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Semantic Release
        uses: python-semantic-release/python-semantic-release@v9.21.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
